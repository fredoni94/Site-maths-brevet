<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brevet Ready</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb;color:#222;text-align:center}
.container{max-width:500px;margin:auto;padding:20px}
h1{margin-bottom:5px}
button{padding:12px;margin:6px;border:none;border-radius:10px;font-size:16px;cursor:pointer}
.primary{background:#2f6fed;color:white}
.secondary{background:#eaeef7}
.hidden{display:none}
.question{font-size:28px;margin:20px 0}
input{padding:12px;font-size:20px;width:80%;text-align:center}
.badge{padding:6px 10px;border-radius:8px;background:#ddd;margin:3px;display:inline-block}
.lock{opacity:0.4}
</style>
</head>

<body>

<div class="container">

<!-- ACCUEIL -->
<div id="home">
<h1>🎯 Brevet Ready</h1>
<p>Prépare ton brevet efficacement</p>

<h3>Matières</h3>

<div>
<button class="primary" onclick="openMath()">🧮 Mathématiques</button>
</div>

<div class="lock">
<button class="secondary">📖 Français (bientôt)</button>
<button class="secondary">🌍 Histoire-Géo (bientôt)</button>
<button class="secondary">🔬 Sciences (bientôt)</button>
</div>
</div>

<!-- MENU MATH -->
<div id="mathMenu" class="hidden">
<h2>Maths</h2>

<p>Durée</p>
<button onclick="setTime(60)">1 min</button>
<button onclick="setTime(180)">3 min</button>
<button onclick="setTime(300)">5 min</button>

<p>Mode</p>
<button onclick="setMode('add')">Addition</button>
<button onclick="setMode('sub')">Soustraction</button>
<button onclick="setMode('mul')">Multiplication</button>
<button onclick="setMode('mix')">Mix</button>
<button onclick="setMode('enigme')">🧩 Énigmes</button>

<br><br>
<button class="primary" onclick="start()">Commencer</button>
<br>
<button onclick="backHome()">Retour</button>
</div>

<!-- JEU -->
<div id="game" class="hidden">
<h3 id="timer"></h3>
<h3 id="score"></h3>
<div class="question" id="question"></div>
<input id="answer" type="number"/>
<br>
<button onclick="check()">Valider</button>
<p id="feedback"></p>
</div>

<!-- RESULTATS -->
<div id="result" class="hidden">
<h2>Résultat</h2>
<p id="final"></p>
<p id="message"></p>
<button onclick="backHome()">Retour accueil</button>
</div>

</div>

<script>
let time=60,mode='add',timer,score=0,total=0,current;

function openMath(){
document.getElementById("home").classList.add("hidden");
document.getElementById("mathMenu").classList.remove("hidden");
}

function backHome(){
location.reload();
}

function setTime(t){time=t}
function setMode(m){mode=m}

function start(){
score=0;total=0;
document.getElementById("mathMenu").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
next();
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ "+time+"s";
if(time<=0){end();}
},1000);
}

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function next(){
let a=rand(1,10),b=rand(1,10);

if(mode=='mix'){
let ops=['add','sub','mul'];
mode=ops[rand(0,2)];
}

if(mode=='add'){current=a+b;question=a+" + "+b}
if(mode=='sub'){current=a-b;question=a+" - "+b}
if(mode=='mul'){current=a*b;question=a+" × "+b}

if(mode=='enigme'){
a=rand(2,10);
current=a;
question="Je pense à un nombre. x2 + 4 = "+(a*2+4);
}

document.getElementById("question").innerText=question;
document.getElementById("answer").value="";
}

function check(){
let val=parseInt(document.getElementById("answer").value);
total++;

if(val===current){
score++;
document.getElementById("feedback").innerText="✅ Bien joué !";
}else{
document.getElementById("feedback").innerText="❌ "+current;
}

document.getElementById("score").innerText="Score : "+score+" / "+total;

setTimeout(next,500);
}

function end(){
clearInterval(timer);
document.getElementById("game").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

let pct=Math.round((score/total)*100);
document.getElementById("final").innerText="Score : "+pct+"%";

let msg="";
if(pct>80) msg="🔥 Excellent, tu es prêt !";
else if(pct>60) msg="👍 Bon travail, continue";
else msg="💪 Entraîne-toi encore";

document.getElementById("message").innerText=msg;
}
</script>

</body>
</html>
