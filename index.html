<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brevet Ready</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6fb;color:#222}
.container{max-width:520px;margin:auto;padding:20px;text-align:center}
.card{background:white;border-radius:18px;padding:22px;box-shadow:0 8px 25px rgba(0,0,0,.08)}
h1{margin-bottom:6px}
button{width:100%;padding:14px;margin:6px 0;border:none;border-radius:12px;font-size:16px;cursor:pointer;background:#eaeef7}
button:active{transform:scale(.98)}
.primary{background:#2f6fed;color:white;font-weight:bold}
.secondary{background:#eaeef7}
.disabled{opacity:.45}
.hidden{display:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.selected{background:#2f6fed!important;color:white;font-weight:bold}
.question{font-size:30px;margin:24px 0;font-weight:bold}
input{padding:14px;font-size:22px;width:100%;text-align:center;border:2px solid #d8deea;border-radius:12px}
.top{display:flex;gap:8px;justify-content:space-between;margin-bottom:15px}
.pill{flex:1;background:#eef2f8;border-radius:999px;padding:8px;font-size:14px}
.feedback{min-height:28px;font-weight:bold}
.ok{color:#16833a}
.ko{color:#c0392b}
.small{font-size:13px;color:#666}
</style>
</head>
<body>

<div class="container">

<section id="home" class="card">
<h1>🎯 Brevet Ready</h1>
<p>Prépare ton brevet efficacement</p>

<h3>Choisis ta matière</h3>

<button id="mathBtn" class="primary">🧮 Mathématiques</button>

<button class="secondary disabled">📖 Français — bientôt disponible</button>
<button class="secondary disabled">🌍 Histoire-Géo — bientôt disponible</button>
<button class="secondary disabled">🔬 Sciences — bientôt disponible</button>

<p class="small">Version légère, rapide et compatible mobile.</p>
</section>

<section id="mathMenu" class="card hidden">
<h2>🧮 Maths</h2>

<h3>Durée</h3>
<div class="grid">
<button class="time selected" data-time="60">1 min</button>
<button class="time" data-time="180">3 min</button>
<button class="time" data-time="300">5 min</button>
</div>

<h3>Mode</h3>
<div class="grid">
<button class="mode selected" data-mode="add">Addition</button>
<button class="mode" data-mode="sub">Soustraction</button>
<button class="mode" data-mode="mul">Multiplication</button>
<button class="mode" data-mode="mix">Mix</button>
<button class="mode" data-mode="enigme">🧩 Énigmes</button>
</div>

<br>
<button id="startBtn" class="primary">Commencer</button>
<button id="backBtn">Retour accueil</button>
</section>

<section id="game" class="card hidden">
<div class="top">
<div class="pill">⏱ <span id="timer">60</span>s</div>
<div class="pill">✅ <span id="good">0</span></div>
<div class="pill">❌ <span id="bad">0</span></div>
</div>

<div class="question" id="question"></div>

<input id="answer" type="number" inputmode="numeric" placeholder="Ta réponse">
<button id="validateBtn" class="primary">Valider</button>

<p id="feedback" class="feedback"></p>
<p class="small">Appuie sur Entrée pour valider plus vite.</p>
</section>

<section id="result" class="card hidden">
<h2>Résultat final</h2>
<p id="final"></p>
<p id="message"></p>
<button id="restartBtn" class="primary">Recommencer</button>
</section>

</div>

<script>
let selectedTime = 60;
let selectedMode = "add";
let timeLeft = 60;
let timerInterval = null;
let currentAnswer = 0;
let good = 0;
let bad = 0;
let locked = false;

const home = document.getElementById("home");
const mathMenu = document.getElementById("mathMenu");
const game = document.getElementById("game");
const result = document.getElementById("result");

document.getElementById("mathBtn").addEventListener("click", () => {
  home.classList.add("hidden");
  mathMenu.classList.remove("hidden");
});

document.getElementById("backBtn").addEventListener("click", () => {
  mathMenu.classList.add("hidden");
  home.classList.remove("hidden");
});

document.getElementById("restartBtn").addEventListener("click", () => {
  result.classList.add("hidden");
  home.classList.remove("hidden");
});

document.querySelectorAll(".time").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".time").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedTime = Number(btn.dataset.time);
  });
});

document.querySelectorAll(".mode").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedMode = btn.dataset.mode;
  });
});

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("validateBtn").addEventListener("click", checkAnswer);

document.getElementById("answer").addEventListener("keydown", e => {
  if (e.key === "Enter") checkAnswer();
});

function startGame() {
  good = 0;
  bad = 0;
  timeLeft = selectedTime;
  locked = false;

  document.getElementById("good").textContent = good;
  document.getElementById("bad").textContent = bad;
  document.getElementById("timer").textContent = timeLeft;

  mathMenu.classList.add("hidden");
  result.classList.add("hidden");
  game.classList.remove("hidden");

  generateQuestion();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateQuestion() {
  locked = false;

  const answerInput = document.getElementById("answer");
  const feedback = document.getElementById("feedback");

  answerInput.value = "";
  feedback.textContent = "";
  feedback.className = "feedback";

  let modeForQuestion = selectedMode;

  if (selectedMode === "mix") {
    const modes = ["add", "sub", "mul"];
    modeForQuestion = modes[rand(0, modes.length - 1)];
  }

  let a = rand(1, 12);
  let b = rand(1, 12);
  let questionText = "";

  if (modeForQuestion === "add") {
    currentAnswer = a + b;
    questionText = `${a} + ${b} = ?`;
  }

  if (modeForQuestion === "sub") {
    a = rand(5, 30);
    b = rand(1, 20);
    currentAnswer = a - b;
    questionText = `${a} − ${b} = ?`;
  }

  if (modeForQuestion === "mul") {
    currentAnswer = a * b;
    questionText = `${a} × ${b} = ?`;
  }

  if (modeForQuestion === "enigme") {
    const hiddenNumber = rand(2, 12);
    const resultNumber = hiddenNumber * 2 + 4;
    currentAnswer = hiddenNumber;
    questionText = `Je pense à un nombre. Je le multiplie par 2 puis j’ajoute 4. J’obtiens ${resultNumber}. Quel est ce nombre ?`;
  }

  document.getElementById("question").textContent = questionText;

  setTimeout(() => {
    answerInput.focus();
  }, 100);
}

function checkAnswer() {
  if (locked) return;

  const input = document.getElementById("answer");
  const value = input.value.trim();
  const feedback = document.getElementById("feedback");

  if (value === "") {
    feedback.textContent = "Entre une réponse.";
    feedback.className = "feedback ko";
    return;
  }

  locked = true;
  const userAnswer = Number(value);

  if (userAnswer === currentAnswer) {
    good++;
    feedback.textContent = "✅ Bien joué !";
    feedback.className = "feedback ok";
  } else {
    bad++;
    feedback.textContent = `❌ La bonne réponse était ${currentAnswer}`;
    feedback.className = "feedback ko";
  }

  document.getElementById("good").textContent = good;
  document.getElementById("bad").textContent = bad;

  setTimeout(() => {
    if (timeLeft > 0) generateQuestion();
  }, 800);
}

function endGame() {
  clearInterval(timerInterval);
  game.classList.add("hidden");
  result.classList.remove("hidden");

  const total = good + bad;
  const percent = total === 0 ? 0 : Math.round((good / total) * 100);

  document.getElementById("final").innerHTML =
    `<strong>${good}</strong> bonnes réponses sur <strong>${total}</strong><br>Réussite : <strong>${percent}%</strong>`;

  let message = "";

  if (percent >= 85) {
    message = "🔥 Excellent niveau. Tu es clairement sur une dynamique Brevet Ready.";
  } else if (percent >= 65) {
    message = "👍 Bon travail. Continue régulièrement pour gagner en vitesse et en précision.";
  } else {
    message = "💪 Il faut consolider les bases. Recommence en 1 minute puis augmente progressivement.";
  }

  document.getElementById("message").textContent = message;
}
</script>

</body>
</html>
